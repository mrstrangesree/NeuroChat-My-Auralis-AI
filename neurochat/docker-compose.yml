version: '3.9'

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neurochat-backend
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite+aiosqlite:///./neurochat.db
      - CORS_ORIGINS=["http://localhost", "http://localhost:80", "http://frontend"]
      - DEBUG=false
    volumes:
      - backend_data:/app/neurochat.db
      - uploads:/app/uploads
      - chroma_db:/app/chroma_db
      - logs:/app/logs
    networks:
      - neurochat-net
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neurochat-frontend
    restart: unless-stopped
    networks:
      - neurochat-net
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: neurochat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - neurochat-net
    depends_on:
      - frontend
      - backend

  # ── Ollama ─────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: neurochat-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - neurochat-net
    # Uncomment for GPU (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  neurochat-net:
    driver: bridge

volumes:
  backend_data:
  uploads:
  chroma_db:
  logs:
  ollama_data:
